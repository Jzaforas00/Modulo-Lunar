<div class="container">

  <h1>Módulo Lunar</h1>

  <div class="layout">

    <!-- FORMULARIO -->
    <div class="panel form-panel">

      <h2>Registro de roca</h2>

      <form>

        <div class="field">
          <label>ID Mineral</label>
          <input type="text" [(ngModel)]="roca.id" name="id" placeholder="AB1234CD">
        </div>

        <div class="field">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="roca.nombre" name="nombre">
        </div>

        <div class="field">
          <label>Grupo</label>
          <select [(ngModel)]="roca.grupo" name="grupo">
            <option value="">Selecciona</option>
            <option>Ígneas</option>
            <option>Metamórficas</option>
            <option>Sedimentarias</option>
          </select>
        </div>

        <div class="field">
          <label>Dureza</label>
          <input type="number" [(ngModel)]="roca.dureza" name="dureza" min="1" max="10">
        </div>

        <div class="field">
          <label>Grano</label>
          <select [(ngModel)]="roca.grano" name="grano">
            <option value="">Selecciona</option>
            <option>Muy grueso</option>
            <option>Grueso</option>
            <option>Medio</option>
            <option>Fino</option>
          </select>
        </div>

        <div class="field">
          <label>Clasificación</label>
          <select [(ngModel)]="roca.clasificacion" name="clasificacion">
            <option value="">Selecciona</option>
            <option>Construcción</option>
            <option>Ornamentales</option>
            <option>Utensilios</option>
            <option>Piedras machacadas</option>
          </select>
        </div>

        <div class="field">
          <label>Cristales</label>
          <input type="number" [(ngModel)]="roca.cristales" name="cristales" min="0" max="10">
        </div>

        <div class="field">
          <label>Temperatura</label>
          <input type="number" [(ngModel)]="roca.temperatura" name="temperatura">
        </div>

        <div class="field full">
          <label>Estructura</label>
          <textarea [(ngModel)]="roca.estructura" name="estructura"></textarea>
        </div>

        <div class="field full">
          <label>Forma de granos</label>
          <textarea [(ngModel)]="roca.formaGranos" name="formaGranos"></textarea>
        </div>

        <div class="field full">
          <label>Textura</label>
          <select [(ngModel)]="roca.textura" name="textura">
            <option value="">Selecciona</option>
            <option>Vítrea</option>
            <option>Afanítica</option>
            <option>Fanerítica</option>
          </select>
        </div>

      </form>

      <button (click)="analizar()">Analizar roca</button>

    </div>

    <!-- RESULTADO -->
    <div class="panel result-panel">

      <h2>Control de misión</h2>

      <div class="resultado" *ngIf="resultado !== null">

        <p *ngIf="resultado" class="ok">🙂 Roca válida</p>
        <p *ngIf="!resultado" class="bad">😡 Roca no válida</p>

      </div>

    </div>

  </div>

</div>
