<div class="container">

  <h1>Módulo Lunar</h1>

  <form>
    <label>ID del mineral</label>
    <input
      type="text"
      [(ngModel)]="roca.id"
      name="id"
    >
    
    <label>Nombre</label>
    <input
      type="text"
      [(ngModel)]="roca.nombre"
      name="nombre"
    >

    <label>Grupo</label>
    <select
      [(ngModel)]="roca.grupo"
      name="grupo"
    >
      <option value="">Selecciona</option>
      <option>Ígneas</option>
      <option>Metamórficas</option>
      <option>Sedimentarias</option>
    </select>

    <label>Textura</label>
    <select
      [(ngModel)]="roca.textura"
      name="textura"
    >
      <option value="">Selecciona</option>
      <option>Vítrea</option>
      <option>Afanítica</option>
      <option>Fanerítica</option>
    </select>

  </form>

  <div class="resultado">

    <h2>Datos introducidos</h2>

    <p><strong>ID:</strong> {{ roca.id }}</p>

    <p><strong>Nombre:</strong> {{ roca.nombre }}</p>

    <p><strong>Grupo:</strong> {{ roca.grupo }}</p>

    <p><strong>Textura:</strong> {{ roca.textura }}</p>

  </div>

</div>
